<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4c1d95"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="50" cy="30" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="280" cy="155" r="40" fill="rgba(255,255,255,.03)"/>
<!-- image frame -->
<rect x="80" y="28" width="48" height="40" rx="3" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
<circle cx="94" cy="42" r="5" fill="rgba(255,255,255,.2)"/>
<path d="M82 62 L94 50 L102 56 L126 40" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
<!-- AI sparkle -->
<path d="M142 36 L146 28 L150 36 L158 40 L150 44 L146 52 L142 44 L134 40 Z" fill="rgba(255,255,255,.25)" stroke="rgba(255,255,255,.4)" stroke-width=".6"/>
<circle cx="146" cy="40" r="2" fill="rgba(255,255,255,.5)"/>
<!-- arrow -->
<path d="M162 40 L180 40" stroke="rgba(255,255,255,.35)" stroke-width="1.5" stroke-linecap="round"/>
<path d="M176 36 L182 40 L176 44" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5" stroke-linecap="round"/>
<!-- result image -->
<rect x="188" y="28" width="48" height="40" rx="3" fill="url(#s)" stroke="rgba(255,255,255,.5)" stroke-width="1.2"/>
<circle cx="202" cy="42" r="5" fill="rgba(255,255,255,.25)"/>
<path d="M190 62 L202 48 L210 54 L234 38" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
<!-- checkmark on result -->
<circle cx="228" cy="36" r="6" fill="rgba(255,255,255,.2)"/>
<path d="M224 36 L227 39 L232 33" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.2" stroke-linecap="round"/>
<!-- text -->
<text x="160" y="100" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="14" font-weight="600">AI画像編集ツール比較</text>
<text x="160" y="120" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">補正・背景生成に使えるサービス</text>
<rect x="120" y="132" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
