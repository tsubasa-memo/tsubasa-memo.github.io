<rect x="76" y="58" width="20" height="22" rx="2" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<path d="M80 58 C80 52 92 52 92 58" fill="none" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<!-- text -->
<text x="160" y="116" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="13" font-weight="600">ChatGPTで商品説明文</text>
<text x="160" y="136" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">EC担当者のAI活用メモ</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
