<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4c1d95"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="50" cy="30" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="275" cy="150" r="40" fill="rgba(255,255,255,.03)"/>
<!-- chat bubble (user) -->
<rect x="80" y="26" width="70" height="24" rx="8" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<line x1="92" y1="38" x2="138" y2="38" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-linecap="round"/>
<!-- chat bubble (AI response) -->
<rect x="120" y="56" width="100" height="30" rx="8" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
<line x1="132" y1="67" x2="208" y2="67" stroke="rgba(255,255,255,.3)" stroke-width="1.2" stroke-linecap="round"/>
<line x1="132" y1="76" x2="196" y2="76" stroke="rgba(255,255,255,.2)" stroke-width="1.2" stroke-linecap="round"/>
<!-- AI sparkle -->
<path d="M232 36 L234 30 L236 36 L242 38 L236 40 L234 46 L232 40 L226 38 Z" fill="rgba(255,255,255,.3)"/>
