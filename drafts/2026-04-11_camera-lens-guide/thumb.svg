<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2e6b8a"/><stop offset="100%" stop-color="#1a4a62"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="55" cy="25" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="270" cy="150" r="40" fill="rgba(255,255,255,.03)"/>
<!-- lens barrel -->
<rect x="100" y="26" width="30" height="56" rx="4" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<circle cx="115" cy="54" r="10" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<circle cx="115" cy="54" r="5" fill="rgba(255,255,255,.15)"/>
<!-- zoom lens -->
<rect x="150" y="30" width="22" height="48" rx="3" fill="url(#s)" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
<circle cx="161" cy="54" r="8" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<circle cx="161" cy="54" r="4" fill="rgba(255,255,255,.12)"/>
<!-- macro lens (small) -->
<rect x="192" y="34" width="18" height="40" rx="3" fill="url(#s)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<circle cx="201" cy="54" r="6" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.2)" stroke-width=".8"/>
<circle cx="201" cy="54" r="3" fill="rgba(255,255,255,.1)"/>
<!-- labels -->
<text x="115" y="88" text-anchor="middle" fill="rgba(255,255,255,.5)" font-family="sans-serif" font-size="7">単焦点</text>
<text x="161" y="88" text-anchor="middle" fill="rgba(255,255,255,.5)" font-family="sans-serif" font-size="7">ズーム</text>
<text x="201" y="88" text-anchor="middle" fill="rgba(255,255,255,.5)" font-family="sans-serif" font-size="7">マクロ</text>
<!-- text -->
<text x="160" y="118" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="14" font-weight="600">レンズの種類と選び方</text>
<text x="160" y="138" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">単焦点・ズーム・マクロの違い</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
