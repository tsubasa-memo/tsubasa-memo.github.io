<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2e6b8a"/><stop offset="100%" stop-color="#1a4a62"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="50" cy="30" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="280" cy="150" r="40" fill="rgba(255,255,255,.03)"/>
<!-- book/dictionary icon -->
<rect x="110" y="24" width="64" height="50" rx="3" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<line x1="142" y1="24" x2="142" y2="74" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
<!-- text lines left page -->
<line x1="118" y1="36" x2="136" y2="36" stroke="rgba(255,255,255,.3)" stroke-width="1" stroke-linecap="round"/>
<line x1="118" y1="44" x2="134" y2="44" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-linecap="round"/>
<line x1="118" y1="52" x2="136" y2="52" stroke="rgba(255,255,255,.3)" stroke-width="1" stroke-linecap="round"/>
<line x1="118" y1="60" x2="132" y2="60" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-linecap="round"/>
<!-- text lines right page -->
<line x1="148" y1="36" x2="166" y2="36" stroke="rgba(255,255,255,.3)" stroke-width="1" stroke-linecap="round"/>
<line x1="148" y1="44" x2="164" y2="44" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-linecap="round"/>
<line x1="148" y1="52" x2="166" y2="52" stroke="rgba(255,255,255,.3)" stroke-width="1" stroke-linecap="round"/>
<line x1="148" y1="60" x2="162" y2="60" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-linecap="round"/>
<!-- camera icon (small) -->
<rect x="192" y="34" width="32" height="22" rx="3" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<circle cx="208" cy="45" r="7" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<circle cx="208" cy="45" r="3" fill="rgba(255,255,255,.15)"/>
<!-- ABC label -->
<text x="208" y="70" text-anchor="middle" fill="rgba(255,255,255,.4)" font-family="sans-serif" font-size="9" font-weight="700">ISO F SS</text>
<!-- text -->
<text x="160" y="116" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="14" font-weight="600">カメラ用語辞典</text>
<text x="160" y="136" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">初心者が覚えたい基本用語まとめ</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
