<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#dc7a28"/><stop offset="100%" stop-color="#a16207"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="50" cy="30" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="280" cy="155" r="40" fill="rgba(255,255,255,.03)"/>
<!-- cloud -->
<ellipse cx="130" cy="38" rx="28" ry="16" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
<ellipse cx="118" cy="42" rx="14" ry="10" fill="rgba(255,255,255,.08)"/>
<ellipse cx="142" cy="42" rx="14" ry="10" fill="rgba(255,255,255,.08)"/>
<!-- upload arrow -->
<path d="M130 54 L130 44" stroke="rgba(255,255,255,.4)" stroke-width="1.5" stroke-linecap="round"/>
<path d="M126 48 L130 42 L134 48" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5" stroke-linecap="round"/>
<!-- smartphone -->
<rect x="86" y="52" width="16" height="26" rx="2" fill="url(#s)" stroke="rgba(255,255,255,.35)" stroke-width=".8"/>
<rect x="89" y="56" width="10" height="16" rx="1" fill="rgba(255,255,255,.04)"/>
<!-- SSD/HDD -->
<rect x="196" y="32" width="44" height="28" rx="4" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<circle cx="232" cy="46" r="3" fill="rgba(100,220,180,.3)"/>
<line x1="204" y1="42" x2="220" y2="42" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round"/>
<line x1="204" y1="50" x2="216" y2="50" stroke="rgba(255,255,255,.15)" stroke-width="1.5" stroke-linecap="round"/>
<!-- connection line -->
<path d="M104 60 L130 54" stroke="rgba(255,255,255,.15)" stroke-width=".8" stroke-dasharray="2 2"/>
<path d="M174 46 L196 46" stroke="rgba(255,255,255,.15)" stroke-width=".8" stroke-dasharray="2 2"/>
<text x="160" y="116" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="13" font-weight="600">スマホ写真のバックアップ</text>
<text x="160" y="136" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">クラウドとローカル保存を比較</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
