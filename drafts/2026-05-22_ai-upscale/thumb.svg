<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4c1d95"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="50" cy="30" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="280" cy="155" r="40" fill="rgba(255,255,255,.03)"/>
<!-- small blurry image -->
<rect x="80" y="30" width="36" height="36" rx="3" fill="url(#s)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
<circle cx="92" cy="42" r="4" fill="rgba(255,255,255,.1)"/>
<line x1="84" y1="56" x2="92" y2="48" stroke="rgba(255,255,255,.08)" stroke-width="2"/>
<text x="98" y="78" text-anchor="middle" fill="rgba(255,255,255,.4)" font-family="sans-serif" font-size="8">低画質</text>
<!-- AI sparkle + arrow -->
<path d="M128 48 L152 48" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-linecap="round"/>
<path d="M148 44 L154 48 L148 52" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-linecap="round"/>
<path d="M140 34 L142 28 L144 34 L150 36 L144 38 L142 44 L140 38 L134 36 Z" fill="rgba(255,255,255,.3)"/>
<!-- large sharp image -->
<rect x="164" y="22" width="52" height="52" rx="3" fill="url(#s)" stroke="rgba(255,255,255,.5)" stroke-width="1.2"/>
<circle cx="182" cy="40" r="7" fill="rgba(255,255,255,.15)"/>
<path d="M168 66 L182 52 L192 58 L214 40" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
<text x="190" y="86" text-anchor="middle" fill="rgba(255,255,255,.5)" font-family="sans-serif" font-size="8">高画質</text>
<!-- up arrow -->
<path d="M234 56 L234 32 L228 32 L238 22 L248 32 L242 32 L242 56 Z" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.3)" stroke-width=".6"/>
<text x="160" y="116" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="14" font-weight="600">AIで写真の画質を上げる</text>
<text x="160" y="136" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">無料・有料ツールを比較</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
