<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2d8659"/><stop offset="100%" stop-color="#1a5c3a"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="50" cy="30" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="280" cy="155" r="40" fill="rgba(255,255,255,.03)"/>
<!-- light box -->
<rect x="84" y="24" width="50" height="50" rx="3" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<rect x="98" y="38" width="22" height="22" rx="2" fill="rgba(255,255,255,.1)"/>
<!-- light stand -->
<line x1="160" y1="28" x2="160" y2="72" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>
<rect x="148" y="22" width="24" height="14" rx="2" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<line x1="152" y1="72" x2="168" y2="72" stroke="rgba(255,255,255,.25)" stroke-width="1.5" stroke-linecap="round"/>
<!-- tripod -->
<line x1="216" y1="28" x2="216" y2="56" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>
<line x1="206" y1="72" x2="216" y2="56" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
<line x1="226" y1="72" x2="216" y2="56" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
<line x1="216" y1="72" x2="216" y2="56" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
<!-- camera on tripod -->
<rect x="206" y="20" width="20" height="14" rx="2" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.35)" stroke-width=".8"/>
<circle cx="216" cy="27" r="4" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.25)" stroke-width=".6"/>
<text x="160" y="116" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="13" font-weight="600">商品撮影の機材リスト</text>
<text x="160" y="136" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">予算別に揃えるべきもの</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
