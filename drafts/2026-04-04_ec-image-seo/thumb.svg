<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2d8659"/><stop offset="100%" stop-color="#1a5c3a"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="55" cy="25" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="275" cy="155" r="40" fill="rgba(255,255,255,.03)"/>
<!-- image file icon -->
<rect x="90" y="28" width="48" height="48" rx="4" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<circle cx="104" cy="44" r="6" fill="rgba(255,255,255,.2)"/>
<path d="M92 68 L104 56 L112 62 L122 50 L136 68 Z" fill="rgba(255,255,255,.15)"/>
<!-- file name tag -->
<rect x="148" y="32" width="88" height="20" rx="3" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<text x="192" y="46" text-anchor="middle" fill="rgba(255,255,255,.65)" font-family="monospace" font-size="8">product-01.jpg</text>
<!-- alt tag -->
<rect x="148" y="58" width="88" height="20" rx="3" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<text x="192" y="72" text-anchor="middle" fill="rgba(255,255,255,.65)" font-family="monospace" font-size="8">alt="商品名..."</text>
<!-- search icon -->
<circle cx="260" cy="45" r="12" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.2"/>
<line x1="268" y1="53" x2="276" y2="61" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-linecap="round"/>
<!-- text -->
<text x="160" y="116" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="13" font-weight="600">EC画像のファイル名とalt属性</text>
<text x="160" y="136" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">SEOに効く命名ルール</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
