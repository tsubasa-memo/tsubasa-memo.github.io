<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4c1d95"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="50" cy="30" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="280" cy="155" r="40" fill="rgba(255,255,255,.03)"/>
<!-- certificate -->
<rect x="108" y="22" width="60" height="46" rx="3" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<line x1="120" y1="36" x2="156" y2="36" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-linecap="round"/>
<line x1="124" y1="44" x2="152" y2="44" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-linecap="round"/>
<line x1="126" y1="52" x2="150" y2="52" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-linecap="round"/>
<!-- seal/stamp -->
<circle cx="148" cy="60" r="8" fill="rgba(255,200,100,.15)" stroke="rgba(255,200,100,.4)" stroke-width="1"/>
<!-- medal -->
<circle cx="206" cy="42" r="16" fill="rgba(255,255,255,.08)" stroke="rgba(255,200,100,.4)" stroke-width="1.2"/>
<circle cx="206" cy="42" r="10" fill="rgba(255,200,100,.1)"/>
<path d="M202 38 L204 34 L206 38 L210 40 L206 42 L204 46 L202 42 L198 40 Z" fill="rgba(255,255,255,.3)"/>
<!-- ribbon -->
<line x1="198" y1="56" x2="194" y2="72" stroke="rgba(255,200,100,.3)" stroke-width="2" stroke-linecap="round"/>
<line x1="214" y1="56" x2="218" y2="72" stroke="rgba(255,200,100,.3)" stroke-width="2" stroke-linecap="round"/>
<text x="160" y="116" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="14" font-weight="600">写真関連の資格まとめ</text>
<text x="160" y="136" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">フォトマスター検定から色彩検定まで</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
