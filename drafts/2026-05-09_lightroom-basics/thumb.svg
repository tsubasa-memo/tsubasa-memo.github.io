<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a8a7a"/><stop offset="100%" stop-color="#0f5e52"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="50" cy="30" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="275" cy="150" r="40" fill="rgba(255,255,255,.03)"/>
<!-- monitor frame -->
<rect x="100" y="22" width="120" height="56" rx="4" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<!-- image area -->
<rect x="106" y="28" width="60" height="44" rx="2" fill="rgba(255,255,255,.06)"/>
<circle cx="120" cy="42" r="6" fill="rgba(255,255,255,.15)"/>
<path d="M108 66 L120 52 L132 60 L150 44 L164 66 Z" fill="rgba(255,255,255,.08)"/>
<!-- sliders panel -->
<rect x="172" y="28" width="42" height="44" rx="2" fill="rgba(255,255,255,.04)"/>
<!-- slider 1 - exposure -->
<line x1="178" y1="38" x2="208" y2="38" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round"/>
<circle cx="196" cy="38" r="2.5" fill="rgba(255,255,255,.5)"/>
<!-- slider 2 - WB -->
<line x1="178" y1="48" x2="208" y2="48" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round"/>
<circle cx="190" cy="48" r="2.5" fill="rgba(255,255,255,.5)"/>
<!-- slider 3 - saturation -->
<line x1="178" y1="58" x2="208" y2="58" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round"/>
<circle cx="200" cy="58" r="2.5" fill="rgba(255,255,255,.5)"/>
<!-- monitor stand -->
<rect x="148" y="78" width="24" height="4" rx="1" fill="rgba(255,255,255,.15)"/>
<rect x="140" y="82" width="40" height="3" rx="1.5" fill="rgba(255,255,255,.1)"/>
<!-- text -->
<text x="160" y="116" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="14" font-weight="600">Lightroomの使い方入門</text>
<text x="160" y="136" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">最初に覚える5つの基本操作</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
