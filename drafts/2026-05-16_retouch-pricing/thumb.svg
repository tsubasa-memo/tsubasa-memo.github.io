<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a8a7a"/><stop offset="100%" stop-color="#0f5e52"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="50" cy="30" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="275" cy="150" r="40" fill="rgba(255,255,255,.03)"/>
<!-- yen coin -->
<circle cx="120" cy="50" r="22" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<text x="120" y="56" text-anchor="middle" fill="rgba(255,255,255,.7)" font-family="sans-serif" font-size="18" font-weight="700">¥</text>
<!-- price tag -->
<rect x="160" y="32" width="60" height="36" rx="4" fill="url(#s)" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
<line x1="170" y1="44" x2="210" y2="44" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-linecap="round"/>
<line x1="170" y1="54" x2="200" y2="54" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round"/>
<!-- brush icon -->
<rect x="232" y="34" width="6" height="28" rx="2" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<path d="M230 62 L240 62 L238 72 L232 72 Z" fill="rgba(255,255,255,.2)"/>
<text x="160" y="116" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="14" font-weight="600">レタッチの料金相場</text>
<text x="160" y="136" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">用途別の費用感まとめ</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
