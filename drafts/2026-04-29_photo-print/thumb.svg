<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#dc7a28"/><stop offset="100%" stop-color="#a16207"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="50" cy="30" r="45" fill="rgba(255,255,255,.03)"/>
<circle cx="280" cy="155" r="40" fill="rgba(255,255,255,.03)"/>
<!-- printer -->
<rect x="104" y="36" width="56" height="30" rx="4" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<rect x="114" y="26" width="36" height="14" rx="2" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<!-- paper output -->
<rect x="114" y="64" width="36" height="22" rx="1" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<circle cx="126" cy="72" r="3" fill="rgba(255,255,255,.15)"/>
<!-- photo prints -->
<rect x="180" y="28" width="30" height="22" rx="2" fill="url(#s)" stroke="rgba(255,255,255,.35)" stroke-width="1" transform="rotate(-5 195 39)"/>
<rect x="190" y="32" width="30" height="22" rx="2" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1" transform="rotate(3 205 43)"/>
<!-- convenience store icon -->
<rect x="230" y="42" width="28" height="22" rx="2" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<rect x="230" y="38" width="28" height="6" rx="1" fill="rgba(255,255,255,.12)"/>
<text x="160" y="116" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-size="14" font-weight="600">写真プリントの方法</text>
<text x="160" y="136" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="11">コンビニ・ネット・自宅を比較</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
