<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--text:#2d2d2d;--text-sub:#666;--accent:#2e6b8a;--accent-light:#e8f0f5;--border:#e0ddd8;--card:#fff;--link:#2e6b8a;--tag-bg:#f2f0ec}
body{font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--text);line-height:1.85;font-size:16px;-webkit-font-smoothing:antialiased}
a{color:var(--link);text-decoration:none}a:hover{text-decoration:underline}
.wrap{max-width:780px;margin:0 auto;padding:0 20px}
header{background:#fff;border-bottom:1px solid var(--border);padding:18px 0}
header .wrap{display:flex;align-items:center;justify-content:space-between}
.site-name{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.5px}
.site-nav{display:flex;gap:16px}.site-nav a{font-size:12px;color:var(--text-sub);text-decoration:none;padding:3px 10px;background:var(--tag-bg);border-radius:20px}.site-nav a:hover{color:var(--accent);text-decoration:none}
main{padding:48px 0 64px}
main h1{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:32px;padding-bottom:10px;border-bottom:2px solid var(--accent)}
main p{margin-bottom:16px;font-size:15px}
#mail-area{text-align:center;margin:32px 0}
.mail-link{display:inline-block;padding:14px 36px;background:var(--accent);color:#fff;border-radius:8px;font-size:15px;font-weight:700;text-decoration:none;transition:opacity .2s}
.mail-link:hover{opacity:.85;color:#fff;text-decoration:none}
footer{background:#fff;border-top:1px solid var(--border);padding:32px 0;text-align:center;font-size:13px;color:var(--text-sub)}
.footer-links{margin-bottom:12px}.footer-links a{margin:0 12px;color:var(--text-sub);font-size:13px}.footer-links a:hover{color:var(--accent)}
@media(max-width:600px){
main h1{font-size:19px}
}
</style>

</div>

<main>
<div class="wrap">

<p>当サイトへのお問い合わせは、下記のメールアドレス宛にお送りください。</p>

<div id="mail-area">

</div>

<p>※返信までに数日いただく場合があります。<br>
※広告掲載・営業目的のメールにはお返事しておりません。</p>

</div>
</main>

</div>
&copy; 2026 ツバサのメモ帳
</div>
</footer>

<script>
(function(){
  var u = 'tsubasa233';
  var d = 'proton.me';
  var e = u + '@' + d;
  var a = document.createElement('a');
  a.href = 'mail' + 'to:' + e;
  a.textContent = e;
  a.className = 'mail-link';
  document.getElementById('mail-area').appendChild(a);
})();
</script>
