<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--text:#232a31;--text-sub:#65737e;--accent:#2e6b8a;--bg:#f8f9fa;--card:#fff;--border:#e5e7eb}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.8}
header{background:#fff;border-bottom:1px solid var(--border);padding:16px 0;text-align:center}
header a{color:var(--text);text-decoration:none;font-weight:700;font-size:15px}
header span{font-size:12px;color:var(--text-sub);margin-left:8px}
main{max-width:600px;margin:0 auto;padding:80px 20px;text-align:center}
.error-code{font-size:80px;font-weight:700;color:var(--accent);opacity:.3;line-height:1}
h1{font-size:20px;font-weight:700;margin:16px 0 12px}
p{font-size:14px;color:var(--text-sub);margin-bottom:32px}
.btn{display:inline-block;padding:14px 36px;background:var(--accent);color:#fff;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;transition:opacity .2s}
.btn:hover{opacity:.85;text-decoration:none}
footer{background:#fff;border-top:1px solid var(--border);padding:32px 0;text-align:center;font-size:13px;color:var(--text-sub);position:fixed;bottom:0;width:100%}
</style>

</main>

<footer>
