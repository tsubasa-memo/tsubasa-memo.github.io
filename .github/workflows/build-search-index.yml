name: Build Search Index

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - 'glossary/*.html'
      - 'build_search_index.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate search-index.json
        run: python3 build_search_index.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain search-index.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add search-index.json
            git commit -m "chore: auto-regenerate search-index.json"
            git push
          else
            echo "No changes in search-index.json"
          fi
