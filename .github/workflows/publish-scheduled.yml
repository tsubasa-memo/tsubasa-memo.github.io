name: Publish scheduled articles
on:
  schedule:
    # UTC 10:00 = JST 19:00
    - cron: '0 10 28 3 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scheduled-20260328
          fetch-depth: 0
      - name: Merge to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge scheduled-20260328 --no-ff -m "publish: カメラ記事2本を公開"
          git push origin main
          git push origin --delete scheduled-20260328
