name: 予約投稿の自動公開

on:
  schedule:
    # 毎週土曜 午前3時UTC（日本時間 土曜正午12時）に実行
    - cron: '0 3 * * 6'
  workflow_dispatch:
    # 手動実行も可能（GitHubの画面から「Run workflow」で実行できる）

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 今日公開する記事があるか確認
        id: check
        run: |
          TODAY=$(TZ='Asia/Tokyo' date +%Y-%m-%d)
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          if ls drafts/${TODAY}_*/ 1> /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "📅 ${TODAY} に公開する記事が見つかりました"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "📭 ${TODAY} に公開する記事はありません"
          fi

      - name: 記事を公開
        if: steps.check.outputs.found == 'true'
        run: |
          TODAY=${{ steps.check.outputs.today }}

          for dir in drafts/${TODAY}_*/; do
            [ -d "$dir" ] || continue

            # meta.json を読み込む
            META="$dir/meta.json"
            if [ ! -f "$META" ]; then
              echo "⚠️ meta.json が見つかりません: $dir"
              continue
            fi

            SLUG=$(python3 -c "import json; print(json.load(open('$META'))['slug'])")
            TITLE=$(python3 -c "import json; print(json.load(open('$META'))['title'])")
            DESC=$(python3 -c "import json; print(json.load(open('$META'))['description'])")
            CAT=$(python3 -c "import json; print(json.load(open('$META'))['category'])")
            CAT_LABEL=$(python3 -c "import json; print(json.load(open('$META'))['category_label'])")

            echo "📄 公開: $SLUG ($TITLE)"

            # ファイルを所定の場所に移動
            cp "$dir/${SLUG}.html" "./${SLUG}.html"
            cp "$dir/thumb.svg" "./thumbs/${SLUG}.svg"
            cp "$dir/og.png" "./og/${SLUG}.png"

            # index.html を更新
            # 既存のNEWタグを日付に変更
            MONTH=$(TZ='Asia/Tokyo' date +%Y.%m)
            sed -i "s/<span class=\"card-num new\">NEW<\/span>/<span class=\"card-num\">${MONTH}<\/span>/" index.html

            # 新しい記事カードをarticle-listの先頭に追加
            NEW_CARD="<div class=\"article-card\">\n<a href=\"${SLUG}.html\">\n<div class=\"card-thumb\"><img src=\"thumbs/${SLUG}.svg\" alt=\"${TITLE}\" width=\"320\" height=\"180\"><\/div>\n<div class=\"card-body\">\n<span class=\"card-num new\">NEW<\/span>\n<h2>${TITLE}<\/h2>\n<p class=\"card-desc\">${DESC}<\/p>\n<span class=\"card-tag\">${CAT_LABEL}<\/span>\n<\/div>\n<\/a>\n<\/div>\n"
            sed -i "/<div class=\"article-list\">/a\\${NEW_CARD}" index.html

            # archive.html にも同様に追加
            if [ -f "archive.html" ]; then
              sed -i "/<div class=\"article-list\">/a\\${NEW_CARD}" archive.html
            fi

            # sitemap.xml に追加
            if [ -f "sitemap.xml" ]; then
              SITEMAP_ENTRY="  <url>\n    <loc>https:\/\/tsubasa-memo.github.io\/${SLUG}.html<\/loc>\n    <lastmod>${TODAY}<\/lastmod>\n    <changefreq>monthly<\/changefreq>\n  <\/url>"
              sed -i "/<\/urlset>/i\\${SITEMAP_ENTRY}" sitemap.xml
            fi

            # 記事数カウントを更新（archive-btnの件数）
            ARTICLE_COUNT=$(ls -1 *.html | grep -v -E '^(index|archive|404)\.html$' | wc -l)
            sed -i "s/すべての記事を見る（全[0-9]*件）/すべての記事を見る（全${ARTICLE_COUNT}件）/" index.html

            # 公開済みのdraftを削除
            rm -rf "$dir"

            echo "✅ $SLUG を公開しました"
          done

      - name: 変更をコミット＆プッシュ
        if: steps.check.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "publish: 予約記事を公開 (${{ steps.check.outputs.today }})"
          git push
