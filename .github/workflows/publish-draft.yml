name: Publish Draft

on:
  schedule:
    - cron: '0 12 * * 2'    # 火曜 21:00 JST
    - cron: '30 10 * * 3'   # 水曜 19:30 JST
    - cron: '45 13 * * 4'   # 木曜 22:45 JST
    - cron: '0 12 * * 5'    # 金曜 21:00 JST
    - cron: '0 3 * * 6'     # 土曜 12:00 JST
    - cron: '30 4 * * 0'    # 日曜 13:30 JST
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if draft branch exists
        id: check
        run: |
          if git ls-remote --exit-code --heads origin draft; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge draft into main
        if: steps.check.outputs.exists == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/draft --no-ff -m "Publish scheduled articles from draft"
          git push origin main
          git push origin --delete draft
