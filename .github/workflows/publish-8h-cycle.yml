name: 8時間間隔の記事自動公開

on:
  schedule:
    # UTC 0:00, 8:00, 16:00 = JST 9:00, 17:00, 1:00
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 記事公開スクリプトを実行
        run: python scripts/publish-next.py

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive.html sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto-publish: scheduled article update"
            git push
          fi
