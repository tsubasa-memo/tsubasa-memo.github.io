<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8a6b3a"/><stop offset="100%" stop-color="#6b4e2a"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="265" cy="30" r="48" fill="rgba(255,255,255,.03)"/>
<!-- envelope -->
<rect x="108" y="34" width="60" height="44" rx="4" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
<path d="M108 38 L138 58 L168 38" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
<!-- file size badge -->
<rect x="120" y="44" width="36" height="14" rx="3" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<text x="138" y="54" text-anchor="middle" fill="rgba(255,255,255,.7)" font-family="sans-serif" font-size="8" font-weight="700">50MB+</text>
<!-- arrow right -->
<line x1="174" y1="56" x2="200" y2="56" stroke="rgba(255,255,255,.5)" stroke-width="2" stroke-linecap="round"/>
<polygon points="196,51 205,56 196,61" fill="rgba(255,255,255,.5)"/>
<!-- service options -->
<rect x="208" y="36" width="40" height="13" rx="3" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.22)" stroke-width=".8"/>
<text x="228" y="46" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="7.5">GigaFile</text>
<rect x="208" y="53" width="40" height="13" rx="3" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.18)" stroke-width=".8"/>
<text x="228" y="63" text-anchor="middle" fill="rgba(255,255,255,.45)" font-family="sans-serif" font-size="7.5">Dropbox</text>
<rect x="208" y="70" width="40" height="13" rx="3" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.14)" stroke-width=".8"/>
<text x="228" y="80" text-anchor="middle" fill="rgba(255,255,255,.35)" font-family="sans-serif" font-size="7.5">WeTransfer</text>
<!-- text -->
<text x="160" y="112" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="14" font-weight="700" letter-spacing=".5">大容量写真の送り方</text>
<text x="160" y="132" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">無料サービス比較まとめ</text>
<rect x="120" y="144" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
<text x="160" y="162" text-anchor="middle" fill="rgba(224,208,184,.7)" font-family="sans-serif" font-size="10">写真・撮影</text>
</svg>
