<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#14b8a6"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="270" cy="25" r="55" fill="rgba(255,255,255,.04)"/>
<circle cx="45" cy="155" r="40" fill="rgba(255,255,255,.04)"/>
<!-- before/after -->
<rect x="90" y="24" width="60" height="50" rx="4" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<text x="120" y="52" text-anchor="middle" fill="rgba(255,255,255,.4)" font-family="sans-serif" font-size="9" font-weight="600">Before</text>
<circle cx="108" cy="38" r="4" fill="rgba(255,255,255,.2)"/>
<rect x="170" y="24" width="60" height="50" rx="4" fill="rgba(255,255,255,.2)" stroke="rgba(255,255,255,.4)" stroke-width=".8"/>
<text x="200" y="52" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="9" font-weight="600">After</text>
<circle cx="188" cy="38" r="4" fill="rgba(255,255,255,.35)"/>
<!-- arrow -->
<path d="M156 49l8 0" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"/>
<path d="M161 45l4 4-4 4" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- sparkle on after -->
<path d="M222 28l2-5 2 5 5 2-5 2-2 5-2-5-5-2z" fill="rgba(255,255,255,.35)"/>
<!-- text -->
<text x="160" y="105" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="15" font-weight="700" letter-spacing=".5">レタッチとは？</text>
<text x="160" y="125" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">加工との違いをやさしく解説</text>
<rect x="120" y="135" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
