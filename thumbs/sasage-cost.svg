<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a6b5b"/>
      <stop offset="100%" stop-color="#1e4a3a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- 電卓アイコン -->
  <rect x="36" y="32" width="68" height="68" rx="8" fill="rgba(255,255,255,0.1)"/>
  <g transform="translate(70,62)" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-16" y="-18" width="32" height="36" rx="3"/>
    <rect x="-11" y="-13" width="22" height="10" rx="1" fill="rgba(255,255,255,0.25)" stroke="none"/>
    <circle cx="-6" cy="5" r="2" fill="rgba(255,255,255,0.5)" stroke="none"/>
    <circle cx="6" cy="5" r="2" fill="rgba(255,255,255,0.5)" stroke="none"/>
    <circle cx="-6" cy="13" r="2" fill="rgba(255,255,255,0.5)" stroke="none"/>
    <circle cx="6" cy="13" r="2" fill="rgba(255,255,255,0.5)" stroke="none"/>
  </g>
  <text x="70" y="114" text-anchor="middle" fill="#a8d4b8" font-family="sans-serif" font-size="11" font-weight="700">費用</text>

  <!-- コインアイコン -->
  <rect x="126" y="32" width="68" height="68" rx="8" fill="rgba(255,255,255,0.1)"/>
  <g transform="translate(160,64)" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round">
    <circle cx="0" cy="0" r="14"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="700" stroke="none">¥</text>
  </g>
  <text x="160" y="114" text-anchor="middle" fill="#a8d4b8" font-family="sans-serif" font-size="11" font-weight="700">相場</text>

  <!-- カメラアイコン -->
  <rect x="216" y="32" width="68" height="68" rx="8" fill="rgba(255,255,255,0.1)"/>
  <g transform="translate(250,66)" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-18" y="-13" width="36" height="26" rx="3"/>
    <circle cx="0" cy="0" r="8"/>
    <circle cx="0" cy="0" r="5" fill="rgba(255,255,255,0.3)" stroke="none"/>
    <rect x="7" y="-13" width="7" height="5" rx="1" fill="rgba(255,255,255,0.4)" stroke="none"/>
  </g>
  <text x="250" y="114" text-anchor="middle" fill="#a8d4b8" font-family="sans-serif" font-size="11" font-weight="700">撮影</text>

  <!-- つなぎ -->
  <text x="107" y="69" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="16">+</text>
  <text x="197" y="69" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="16">+</text>

  <!-- メインタイトル -->
  <text x="160" y="142" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="15" font-weight="700">ささげ業務の費用相場</text>
  <text x="160" y="163" text-anchor="middle" fill="#98c4a8" font-family="sans-serif" font-size="10">外注・内製・AIの料金比較</text>
</svg>
