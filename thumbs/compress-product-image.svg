<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3a8a6b"/><stop offset="100%" stop-color="#2a6b4e"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="260" cy="28" r="48" fill="rgba(255,255,255,.03)"/>
<circle cx="55" cy="155" r="38" fill="rgba(255,255,255,.03)"/>
<!-- large file -->
<rect x="100" y="28" width="44" height="54" rx="4" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
<text x="122" y="50" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="8" font-weight="700">JPG</text>
<text x="122" y="66" text-anchor="middle" fill="rgba(255,255,255,.45)" font-family="sans-serif" font-size="7">8MB</text>
<!-- arrow -->
<path d="M150 55 L170 55" stroke="rgba(255,255,255,.5)" stroke-width="1.8" stroke-linecap="round" marker-end="url(#arr)"/>
<polygon points="168,51 176,55 168,59" fill="rgba(255,255,255,.5)"/>
<!-- small file -->
<rect x="176" y="36" width="34" height="42" rx="4" fill="rgba(255,255,255,.2)" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
<text x="193" y="55" text-anchor="middle" fill="rgba(255,255,255,.75)" font-family="sans-serif" font-size="8" font-weight="700">JPG</text>
<text x="193" y="68" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="7">800KB</text>
<!-- text -->
<text x="160" y="108" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="15" font-weight="700" letter-spacing=".5">商品画像の圧縮方法</text>
<text x="160" y="128" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">EC掲載に最適なファイルサイズ</text>
<rect x="120" y="140" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
<text x="160" y="158" text-anchor="middle" fill="rgba(184,224,200,.7)" font-family="sans-serif" font-size="10">EC・実務</text>
