<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#1a2a3a"/>
<stop offset="100%" style="stop-color:#2e4a5a"/>
</linearGradient>
</defs>
<rect width="320" height="180" fill="url(#bg)"/>
<!-- Grid pattern -->
<g opacity="0.08" stroke="#fff" stroke-width="0.5">
<line x1="0" y1="30" x2="320" y2="30"/>
<line x1="0" y1="60" x2="320" y2="60"/>
<line x1="0" y1="90" x2="320" y2="90"/>
<line x1="0" y1="120" x2="320" y2="120"/>
<line x1="0" y1="150" x2="320" y2="150"/>
<line x1="40" y1="0" x2="40" y2="180"/>
<line x1="80" y1="0" x2="80" y2="180"/>
<line x1="120" y1="0" x2="120" y2="180"/>
<line x1="160" y1="0" x2="160" y2="180"/>
<line x1="200" y1="0" x2="200" y2="180"/>
<line x1="240" y1="0" x2="240" y2="180"/>
<line x1="280" y1="0" x2="280" y2="180"/>
</g>
<!-- Data dots connected -->
<g>
<circle cx="60" cy="120" r="4" fill="#4fc3f7" opacity="0.8"/>
<circle cx="100" cy="80" r="5" fill="#4fc3f7" opacity="0.9"/>
<circle cx="140" cy="95" r="4" fill="#4fc3f7" opacity="0.7"/>
<circle cx="180" cy="60" r="6" fill="#4fc3f7" opacity="1"/>
<circle cx="220" cy="110" r="4" fill="#4fc3f7" opacity="0.6"/>
<circle cx="260" cy="130" r="3" fill="#4fc3f7" opacity="0.4"/>
<polyline points="60,120 100,80 140,95 180,60 220,110 260,130" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
</g>
<!-- AI icon -->
<g transform="translate(30, 25)">
<rect x="0" y="0" width="28" height="28" rx="6" fill="#4fc3f7" opacity="0.2"/>
<text x="14" y="20" font-family="monospace" font-size="16" fill="#4fc3f7" text-anchor="middle" font-weight="bold">AI</text>
</g>
<!-- Coins/reward icon -->
<g transform="translate(262, 25)">
<circle cx="14" cy="14" r="12" fill="none" stroke="#ffd54f" stroke-width="1.5" opacity="0.7"/>
<text x="14" y="19" font-family="sans-serif" font-size="14" fill="#ffd54f" text-anchor="middle" opacity="0.8">¥</text>
</g>
<!-- Question mark -->
<text x="160" y="55" font-family="sans-serif" font-size="36" fill="#fff" text-anchor="middle" opacity="0.15" font-weight="bold">?</text>
<!-- Title text -->
<text x="160" y="160" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" opacity="0.9">AIデータ収集 副業の将来性</text>
</svg>
