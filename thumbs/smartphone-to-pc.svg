<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8a6b3a"/><stop offset="100%" stop-color="#6b4e2a"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="265" cy="28" r="48" fill="rgba(255,255,255,.03)"/>
<!-- smartphone -->
<rect x="88" y="30" width="36" height="60" rx="6" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
<rect x="93" y="38" width="26" height="26" rx="2" fill="rgba(255,255,255,.15)"/>
<circle cx="106" cy="82" r="3" fill="rgba(255,255,255,.25)"/>
<!-- transfer arrow -->
<line x1="130" y1="60" x2="166" y2="60" stroke="rgba(255,255,255,.5)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4,3"/>
<polygon points="162,54 172,60 162,66" fill="rgba(255,255,255,.6)"/>
<!-- USB cable hint -->
<text x="148" y="74" text-anchor="middle" fill="rgba(255,200,140,.6)" font-family="sans-serif" font-size="7">USB / Wi-Fi</text>
<!-- PC monitor -->
<rect x="172" y="26" width="62" height="46" rx="4" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
<rect x="177" y="31" width="52" height="36" rx="2" fill="rgba(255,255,255,.12)"/>
<!-- folder icon on PC -->
<rect x="189" y="38" width="28" height="22" rx="2" fill="rgba(255,255,255,.2)"/>
<rect x="189" y="35" width="14" height="5" rx="2" fill="rgba(255,255,255,.3)"/>
<!-- PC stand -->
<rect x="195" y="72" width="16" height="6" rx="1" fill="rgba(255,255,255,.15)"/>
<rect x="188" y="78" width="30" height="3" rx="1.5" fill="rgba(255,255,255,.15)"/>
<!-- text -->
<text x="160" y="112" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="14" font-weight="700" letter-spacing=".5">スマホからPCへ転送</text>
<text x="160" y="132" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">USB・Wi-Fi・クラウド3通り</text>
<rect x="120" y="144" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
<text x="160" y="162" text-anchor="middle" fill="rgba(224,208,184,.7)" font-family="sans-serif" font-size="10">写真・撮影</text>
</svg>
