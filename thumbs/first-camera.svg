<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#172554"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="60" cy="30" r="50" fill="rgba(255,255,255,.03)"/>
<circle cx="270" cy="140" r="45" fill="rgba(255,255,255,.03)"/>
<!-- camera body -->
<rect x="112" y="36" width="76" height="48" rx="6" fill="url(#s)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<!-- viewfinder bump -->
<rect x="136" y="26" width="28" height="12" rx="3" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<!-- lens -->
<circle cx="150" cy="60" r="16" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<circle cx="150" cy="60" r="10" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<circle cx="150" cy="60" r="5" fill="rgba(255,255,255,.2)"/>
<!-- flash -->
<circle cx="176" cy="44" r="3" fill="rgba(255,255,255,.35)"/>
<!-- price tag -->
<rect x="200" y="30" width="52" height="22" rx="4" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<text x="226" y="45" text-anchor="middle" fill="rgba(255,255,255,.7)" font-family="sans-serif" font-size="9" font-weight="700">¥100,000</text>
<!-- text -->
<text x="160" y="118" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="15" font-weight="700" letter-spacing=".5">初めてのカメラ選び</text>
<text x="160" y="138" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">予算10万円以下のミラーレス</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
