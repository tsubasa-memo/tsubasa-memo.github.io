<rect x="108" y="18" width="64" height="50" rx="4" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
<circle cx="128" cy="34" r="5" fill="rgba(255,255,255,.25)"/>
<path d="M112 56l12-14 8 10 6-5 14 14H112z" fill="rgba(255,255,255,.15)"/>
<!-- data lines coming out -->
<rect x="180" y="22" width="50" height="10" rx="2" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.2)" stroke-width=".6"/>
<text x="205" y="30" text-anchor="middle" fill="rgba(255,255,255,.45)" font-family="monospace" font-size="6">ISO 400</text>
<rect x="180" y="36" width="50" height="10" rx="2" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.2)" stroke-width=".6"/>
<text x="205" y="44" text-anchor="middle" fill="rgba(255,255,255,.45)" font-family="monospace" font-size="6">f/2.8</text>
<rect x="180" y="50" width="50" height="10" rx="2" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.3)" stroke-width=".6"/>
<text x="205" y="58" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="monospace" font-size="6">📍 GPS</text>
