<!-- text -->
<text x="160" y="100" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="15" font-weight="700" letter-spacing=".5">Exif情報とは？</text>
<text x="160" y="120" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">位置情報のリスクと削除方法</text>
