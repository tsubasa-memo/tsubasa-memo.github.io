<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8a6b3a"/><stop offset="100%" stop-color="#6b4e2a"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="260" cy="30" r="48" fill="rgba(255,255,255,.03)"/>
<!-- smartphone outline -->
<rect x="128" y="20" width="44" height="76" rx="7" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<!-- screen -->
<rect x="133" y="28" width="34" height="34" rx="2" fill="rgba(255,255,255,.15)"/>
<!-- home button -->
<circle cx="150" cy="84" r="4" fill="rgba(255,255,255,.25)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<!-- dimension arrows -->
<line x1="133" y1="24" x2="167" y2="24" stroke="rgba(255,160,100,.6)" stroke-width="1" stroke-dasharray="2,2"/>
<text x="150" y="20" text-anchor="middle" fill="rgba(255,200,140,.8)" font-family="sans-serif" font-size="7">1080px</text>
<line x1="169" y1="28" x2="169" y2="62" stroke="rgba(255,160,100,.6)" stroke-width="1" stroke-dasharray="2,2"/>
<text x="186" y="48" text-anchor="middle" fill="rgba(255,200,140,.8)" font-family="sans-serif" font-size="7">1080px</text>
<!-- 1:1 badge -->
<rect x="200" y="32" width="30" height="16" rx="3" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<text x="215" y="43" text-anchor="middle" fill="rgba(255,255,255,.8)" font-family="sans-serif" font-size="8" font-weight="700">1:1</text>
<!-- text -->
<text x="160" y="118" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="14" font-weight="700" letter-spacing=".5">Instagram画像サイズ</text>
<text x="160" y="138" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">正方形・縦・横の推奨px</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
<text x="160" y="166" text-anchor="middle" fill="rgba(224,208,184,.7)" font-family="sans-serif" font-size="10">写真・撮影</text>
</svg>
