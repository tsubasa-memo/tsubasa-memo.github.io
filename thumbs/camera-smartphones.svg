<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.18)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="280" cy="30" r="50" fill="rgba(255,255,255,.03)"/>
<circle cx="50" cy="150" r="35" fill="rgba(255,255,255,.03)"/>
<!-- phone -->
<rect x="130" y="18" width="42" height="72" rx="7" fill="url(#s)" stroke="rgba(255,255,255,.45)" stroke-width="1.2"/>
<!-- camera module -->
<rect x="138" y="24" width="26" height="26" rx="4" fill="rgba(255,255,255,.08)"/>
<circle cx="148" cy="34" r="8" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
<circle cx="148" cy="34" r="4" fill="rgba(255,255,255,.25)"/>
<circle cx="159" cy="29" r="2.5" fill="rgba(255,255,255,.2)"/>
<!-- screen -->
<rect x="134" y="56" width="34" height="6" rx="1" fill="rgba(255,255,255,.12)"/>
<rect x="134" y="66" width="24" height="3" rx="1" fill="rgba(255,255,255,.08)"/>
<rect x="134" y="72" width="30" height="3" rx="1" fill="rgba(255,255,255,.06)"/>
<circle cx="151" cy="84" r="3" fill="rgba(255,255,255,.2)"/>
<!-- vs badges -->
<rect x="72" y="40" width="36" height="18" rx="9" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<text x="90" y="53" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="8" font-weight="700">iPhone</text>
<rect x="212" y="40" width="36" height="18" rx="9" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<text x="230" y="53" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="8" font-weight="700">Pixel</text>
<rect x="212" y="64" width="36" height="18" rx="9" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.2)" stroke-width=".8"/>
<text x="230" y="77" text-anchor="middle" fill="rgba(255,255,255,.5)" font-family="sans-serif" font-size="8" font-weight="700">Galaxy</text>
<!-- text -->
<text x="160" y="122" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="15" font-weight="700" letter-spacing=".5">カメラで選ぶスマホ</text>
<text x="160" y="142" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">写真がきれいな機種まとめ</text>
<rect x="120" y="152" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
</svg>
