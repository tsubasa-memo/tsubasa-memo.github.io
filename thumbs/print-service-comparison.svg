<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8a6b3a"/><stop offset="100%" stop-color="#6b4e2a"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="260" cy="30" r="48" fill="rgba(255,255,255,.03)"/>
<!-- printer body -->
<rect x="116" y="42" width="68" height="34" rx="4" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
<!-- paper in -->
<rect x="130" y="28" width="40" height="16" rx="2" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<!-- paper out -->
<rect x="130" y="74" width="40" height="20" rx="2" fill="rgba(255,255,255,.2)" stroke="rgba(255,255,255,.35)" stroke-width=".8"/>
<!-- print lines on paper -->
<rect x="135" y="78" width="30" height="2" rx="1" fill="rgba(255,255,255,.5)"/>
<rect x="135" y="83" width="22" height="2" rx="1" fill="rgba(255,255,255,.35)"/>
<rect x="135" y="88" width="26" height="2" rx="1" fill="rgba(255,255,255,.25)"/>
<!-- printer light -->
<circle cx="174" cy="59" r="3" fill="rgba(255,200,100,.6)"/>
<!-- service badges -->
<rect x="198" y="36" width="38" height="13" rx="3" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.22)" stroke-width=".8"/>
<text x="217" y="46" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="7.5">コンビニ</text>
<rect x="198" y="54" width="38" height="13" rx="3" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.18)" stroke-width=".8"/>
<text x="217" y="64" text-anchor="middle" fill="rgba(255,255,255,.45)" font-family="sans-serif" font-size="7.5">ネット注文</text>
<rect x="198" y="72" width="38" height="13" rx="3" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.15)" stroke-width=".8"/>
<text x="217" y="82" text-anchor="middle" fill="rgba(255,255,255,.35)" font-family="sans-serif" font-size="7.5">自宅プリント</text>
<!-- text -->
<text x="160" y="116" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="14" font-weight="700" letter-spacing=".5">印刷サービス比較</text>
<text x="160" y="136" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">コンビニ・ネット・自宅</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
<text x="160" y="166" text-anchor="middle" fill="rgba(224,208,184,.7)" font-family="sans-serif" font-size="10">写真・撮影</text>
</svg>
