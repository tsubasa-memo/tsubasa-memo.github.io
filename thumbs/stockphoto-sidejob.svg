<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6b5b8a"/><stop offset="100%" stop-color="#4a3a6b"/></linearGradient>
<linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.16)"/><stop offset="100%" stop-color="rgba(255,255,255,.04)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="260" cy="30" r="48" fill="rgba(255,255,255,.03)"/>
<!-- camera body -->
<rect x="104" y="34" width="66" height="44" rx="6" fill="url(#s)" stroke="rgba(255,255,255,.38)" stroke-width="1.1"/>
<rect x="124" y="24" width="24" height="12" rx="3" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.28)" stroke-width=".8"/>
<circle cx="137" cy="56" r="14" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.38)" stroke-width="1.1"/>
<circle cx="137" cy="56" r="8" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.22)" stroke-width=".8"/>
<circle cx="137" cy="56" r="4" fill="rgba(255,255,255,.18)"/>
<!-- coin -->
<circle cx="196" cy="42" r="18" fill="rgba(255,220,80,.15)" stroke="rgba(255,220,80,.4)" stroke-width="1.2"/>
<text x="196" y="48" text-anchor="middle" fill="rgba(255,220,80,.8)" font-family="'Helvetica Neue',sans-serif" font-size="16" font-weight="700">¥</text>
<!-- sales badge -->
<rect x="182" y="68" width="40" height="14" rx="3" fill="rgba(255,220,80,.12)" stroke="rgba(255,220,80,.3)" stroke-width=".8"/>
<text x="202" y="78" text-anchor="middle" fill="rgba(255,220,80,.7)" font-family="sans-serif" font-size="7.5" font-weight="700">販売中</text>
<!-- text -->
<text x="160" y="114" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="15" font-weight="700" letter-spacing=".5">ストックフォト副業</text>
<text x="160" y="134" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">写真を売る始め方と収益目安</text>
<rect x="120" y="146" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
<text x="160" y="164" text-anchor="middle" fill="rgba(200,184,224,.7)" font-family="sans-serif" font-size="10">副業・キャリア</text>
</svg>
