<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8a6b3a"/><stop offset="100%" stop-color="#6b4e2a"/></linearGradient>
<linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="rgba(255,100,100,.9)"/><stop offset="100%" stop-color="rgba(255,160,80,.7)"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="260" cy="30" r="48" fill="rgba(255,255,255,.03)"/>
<!-- smartphone outline -->
<rect x="128" y="18" width="44" height="80" rx="7" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>
<!-- screen content: photo grid -->
<rect x="133" y="26" width="34" height="34" rx="2" fill="rgba(255,255,255,.12)"/>
<rect x="133" y="26" width="16" height="16" rx="1" fill="rgba(255,255,255,.15)"/>
<rect x="151" y="26" width="16" height="16" rx="1" fill="rgba(255,255,255,.12)"/>
<rect x="133" y="44" width="16" height="16" rx="1" fill="rgba(255,255,255,.12)"/>
<rect x="151" y="44" width="16" height="16" rx="1" fill="rgba(255,255,255,.1)"/>
<!-- storage bar -->
<rect x="133" y="66" width="34" height="7" rx="3" fill="rgba(255,255,255,.1)"/>
<rect x="133" y="66" width="32" height="7" rx="3" fill="url(#bar)"/>
<!-- storage label -->
<text x="150" y="84" text-anchor="middle" fill="rgba(255,160,100,.8)" font-family="sans-serif" font-size="7" font-weight="700">容量不足</text>
<!-- home button -->
<circle cx="150" cy="90" r="4" fill="rgba(255,255,255,.2)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<!-- usage text -->
<text x="192" y="44" text-anchor="start" fill="rgba(255,200,140,.7)" font-family="sans-serif" font-size="8">128GB</text>
<text x="192" y="56" text-anchor="start" fill="rgba(255,140,100,.65)" font-family="sans-serif" font-size="8">使用中</text>
<text x="192" y="68" text-anchor="start" fill="rgba(255,100,100,.6)" font-family="sans-serif" font-size="8">残り1GB</text>
<!-- text -->
<text x="160" y="118" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="14" font-weight="700" letter-spacing=".5">スマホ容量不足</text>
<text x="160" y="138" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">写真が増えたときの対処法</text>
<rect x="120" y="150" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
<text x="160" y="168" text-anchor="middle" fill="rgba(224,208,184,.7)" font-family="sans-serif" font-size="10">写真・撮影</text>
</svg>
