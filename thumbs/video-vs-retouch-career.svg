<circle cx="160" cy="54" r="14" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
<text x="160" y="59" text-anchor="middle" fill="rgba(255,255,255,.8)" font-family="sans-serif" font-size="13" font-weight="800">VS</text>
<!-- retouch side -->
<rect x="184" y="28" width="80" height="52" rx="5" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
<rect x="196" y="36" width="32" height="24" rx="2" fill="rgba(255,255,255,.08)"/>
