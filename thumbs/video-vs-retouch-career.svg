<circle cx="248" cy="56" r="2" fill="rgba(255,255,255,.35)"/>
<text x="224" y="88" text-anchor="middle" fill="rgba(255,255,255,.5)" font-family="sans-serif" font-size="9" font-weight="600">レタッチ</text>
<!-- text -->
<text x="160" y="118" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="15" font-weight="700" letter-spacing=".5">副業で稼ぐならどっち？</text>
<text x="160" y="138" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">動画編集 vs レタッチャー</text>
<rect x="120" y="148" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
