<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#3b0764"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="280" cy="20" r="55" fill="rgba(255,255,255,.04)"/>
<circle cx="30" cy="160" r="40" fill="rgba(255,255,255,.04)"/>
