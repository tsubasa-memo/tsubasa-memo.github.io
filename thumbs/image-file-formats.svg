<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8a6b3a"/><stop offset="100%" stop-color="#6b4e2a"/></linearGradient>
</defs>
<rect width="320" height="180" fill="url(#g)" rx="6"/>
<circle cx="265" cy="30" r="48" fill="rgba(255,255,255,.03)"/>
<circle cx="50" cy="158" r="38" fill="rgba(255,255,255,.03)"/>
<!-- file cards stacked -->
<rect x="118" y="34" width="40" height="50" rx="3" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
<rect x="125" y="28" width="40" height="50" rx="3" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
<rect x="132" y="22" width="40" height="50" rx="3" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
<text x="152" y="38" text-anchor="middle" fill="rgba(255,255,255,.4)" font-family="sans-serif" font-size="7">PNG</text>
<text x="152" y="46" text-anchor="middle" fill="rgba(255,255,255,.35)" font-family="sans-serif" font-size="7">WEBP</text>
<text x="152" y="54" text-anchor="middle" fill="rgba(255,255,255,.8)" font-family="sans-serif" font-size="9" font-weight="700">JPG</text>
<!-- badges -->
<rect x="182" y="28" width="30" height="14" rx="3" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
<text x="197" y="38" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="sans-serif" font-size="7" font-weight="700">JPG</text>
<rect x="182" y="46" width="30" height="14" rx="3" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.2)" stroke-width=".8"/>
<text x="197" y="56" text-anchor="middle" fill="rgba(255,255,255,.5)" font-family="sans-serif" font-size="7" font-weight="700">PNG</text>
<rect x="182" y="64" width="34" height="14" rx="3" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.18)" stroke-width=".8"/>
<text x="199" y="74" text-anchor="middle" fill="rgba(255,255,255,.4)" font-family="sans-serif" font-size="7" font-weight="700">WEBP</text>
<!-- text -->
<text x="160" y="108" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="'Helvetica Neue',sans-serif" font-size="14" font-weight="700" letter-spacing=".5">画像ファイル形式の違い</text>
<text x="160" y="128" text-anchor="middle" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-size="11">JPG・PNG・WEBP比較</text>
<rect x="120" y="140" width="80" height="1" rx=".5" fill="rgba(255,255,255,.15)"/>
<text x="160" y="158" text-anchor="middle" fill="rgba(224,208,184,.7)" font-family="sans-serif" font-size="10">写真・撮影</text>
</svg>
