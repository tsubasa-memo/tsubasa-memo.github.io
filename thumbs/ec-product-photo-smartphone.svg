<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc7a28"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- スマホアイコン -->
  <rect x="56" y="26" width="68" height="72" rx="8" fill="rgba(255,255,255,0.1)"/>
  <g transform="translate(90,58)" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-12" y="-20" width="24" height="40" rx="3"/>
    <circle cx="0" cy="15" r="2" fill="rgba(255,255,255,0.4)" stroke="none"/>
    <rect x="-8" y="-16" width="16" height="24" rx="1" fill="rgba(255,255,255,0.15)" stroke="none"/>
    <!-- カメラレンズ小 -->
    <circle cx="0" cy="-17" r="1.5" fill="rgba(255,255,255,0.4)" stroke="none"/>
  </g>
  <text x="90" y="114" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="sans-serif" font-size="10" font-weight="700">スマホ</text>

  <!-- 商品（バッグ）アイコン -->
  <rect x="146" y="26" width="68" height="72" rx="8" fill="rgba(255,255,255,0.1)"/>
  <g transform="translate(180,58)" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-14" y="-6" width="28" height="22" rx="3"/>
    <path d="M-8,-6 L-8,-14 Q-8,-18 -4,-18 L4,-18 Q8,-18 8,-14 L8,-6" fill="none"/>
  </g>
  <text x="180" y="114" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="sans-serif" font-size="10" font-weight="700">商品</text>

  <!-- ライトアイコン -->
  <rect x="236" y="26" width="68" height="72" rx="8" fill="rgba(255,255,255,0.1)"/>
  <g transform="translate(270,56)" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- 電球 -->
    <path d="M-8,4 Q-8,-10 0,-14 Q8,-10 8,4 Z"/>
    <line x1="-5" y1="4" x2="5" y2="4"/>
    <line x1="-4" y1="8" x2="4" y2="8"/>
    <!-- 光線 -->
    <line x1="0" y1="-20" x2="0" y2="-16" stroke-width="1.2" opacity="0.5"/>
    <line x1="-12" y1="-12" x2="-9" y2="-9" stroke-width="1.2" opacity="0.5"/>
    <line x1="12" y1="-12" x2="9" y2="-9" stroke-width="1.2" opacity="0.5"/>
  </g>
  <text x="270" y="114" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="sans-serif" font-size="10" font-weight="700">ライト</text>

  <!-- つなぎ -->
  <text x="124" y="65" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="16">+</text>
  <text x="218" y="65" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="16">+</text>

  <!-- メインタイトル -->
  <text x="160" y="140" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="700">スマホでEC商品撮影</text>
  <text x="160" y="161" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="sans-serif" font-size="10">必要な機材と撮り方のコツ</text>
</svg>
