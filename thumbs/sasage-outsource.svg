<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a6b5b"/>
      <stop offset="100%" stop-color="#1e4a3a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- 3つのアイコンボックス：撮影・採寸・原稿 -->
  <!-- 撮影（カメラアイコン） -->
  <rect x="36" y="32" width="68" height="68" rx="8" fill="rgba(255,255,255,0.1)"/>
  <g transform="translate(70,66)" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-18" y="-13" width="36" height="26" rx="3"/>
    <circle cx="0" cy="0" r="8"/>
    <circle cx="0" cy="0" r="5" fill="rgba(255,255,255,0.3)" stroke="none"/>
    <rect x="7" y="-13" width="7" height="5" rx="1" fill="rgba(255,255,255,0.4)" stroke="none"/>
  </g>
  <text x="70" y="114" text-anchor="middle" fill="#a8d4b8" font-family="sans-serif" font-size="11" font-weight="700">撮影</text>

  <!-- 採寸（ものさしアイコン） -->
  <rect x="126" y="32" width="68" height="68" rx="8" fill="rgba(255,255,255,0.1)"/>
  <g transform="translate(160,66)" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round">
    <rect x="-20" y="-8" width="40" height="16" rx="3"/>
    <line x1="-14" y1="-8" x2="-14" y2="-2"/>
    <line x1="-7" y1="-8" x2="-7" y2="-4"/>
    <line x1="0" y1="-8" x2="0" y2="-2"/>
    <line x1="7" y1="-8" x2="7" y2="-4"/>
    <line x1="14" y1="-8" x2="14" y2="-2"/>
  </g>
  <text x="160" y="114" text-anchor="middle" fill="#a8d4b8" font-family="sans-serif" font-size="11" font-weight="700">採寸</text>

  <!-- 原稿（ドキュメントアイコン） -->
  <rect x="216" y="32" width="68" height="68" rx="8" fill="rgba(255,255,255,0.1)"/>
  <g transform="translate(250,66)" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round">
    <rect x="-14" y="-18" width="28" height="36" rx="3"/>
    <line x1="-8" y1="-8" x2="8" y2="-8"/>
    <line x1="-8" y1="-1" x2="8" y2="-1"/>
    <line x1="-8" y1="6" x2="4" y2="6"/>
  </g>
  <text x="250" y="114" text-anchor="middle" fill="#a8d4b8" font-family="sans-serif" font-size="11" font-weight="700">原稿</text>

  <!-- 矢印（3要素をつなぐ） -->
  <text x="107" y="69" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="16">+</text>
  <text x="197" y="69" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="16">+</text>

  <!-- メインタイトル -->
  <text x="160" y="142" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="15" font-weight="700">ささげ業務とは？</text>
  <text x="160" y="163" text-anchor="middle" fill="#98c4a8" font-family="sans-serif" font-size="10">代行会社の選び方と10社比較</text>
</svg>
