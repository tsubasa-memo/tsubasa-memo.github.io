<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" font-family="sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b50"/>
      <stop offset="100%" style="stop-color:#3aaa88"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)" rx="4"/>

  <!-- 料金表アイコン（テーブル風） -->
  <g opacity="0.18">
    <rect x="194" y="28" width="108" height="14" rx="3" fill="#fff"/>
    <rect x="194" y="48" width="108" height="10" rx="3" fill="#fff"/>
    <rect x="194" y="64" width="108" height="10" rx="3" fill="#fff"/>
    <rect x="194" y="80" width="108" height="10" rx="3" fill="#fff"/>
    <rect x="194" y="96" width="108" height="10" rx="3" fill="#fff"/>
    <rect x="194" y="112" width="108" height="10" rx="3" fill="#fff"/>
    <rect x="194" y="128" width="108" height="10" rx="3" fill="#fff"/>
    <rect x="194" y="144" width="108" height="10" rx="3" fill="#fff"/>
    <!-- 縦線 -->
    <rect x="230" y="28" width="2" height="136" fill="#fff"/>
    <rect x="266" y="28" width="2" height="136" fill="#fff"/>
  </g>

  <!-- 円グラフ風アイコン -->
  <circle cx="68" cy="110" r="36" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="16"/>
  <circle cx="68" cy="110" r="36" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="16" stroke-dasharray="72 154" stroke-dashoffset="0"/>
  <circle cx="68" cy="110" r="36" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="16" stroke-dasharray="45 181" stroke-dashoffset="-72"/>
  <circle cx="68" cy="110" r="36" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="16" stroke-dasharray="30 196" stroke-dashoffset="-117"/>

  <!-- テキスト -->
  <text x="160" y="54" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)">レタッチ 料金 相場</text>
  <text x="160" y="84" text-anchor="middle" font-size="15" font-weight="600" fill="rgba(255,255,255,0.95)">写真レタッチの料金相場まとめ</text>
  <text x="160" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="rgba(255,255,255,0.9)">20社以上の価格を1ページに集約</text>

  <!-- バッジ -->
  <rect x="106" y="122" width="108" height="22" rx="11" fill="rgba(255,255,255,0.2)"/>
  <text x="160" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(255,255,255,0.9)">切り抜き43円〜 ／ 色補正300円〜</text>
</svg>
